<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心理健康测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: linear-gradient(160deg, #0a1628 0%, #0d2137 30%, #0a1a2e 60%, #0a1628 100%);
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}
.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 16px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ===== 背景光斑 ===== */
body::before {
  content: '';
  position: fixed;
  top: -20%; left: -20%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(74,222,128,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: floatBlob1 12s ease-in-out infinite;
}
body::after {
  content: '';
  position: fixed;
  bottom: -10%; right: -20%;
  width: 50vw; height: 50vw;
  background: radial-gradient(circle, rgba(129,140,248,0.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: floatBlob2 15s ease-in-out infinite;
}
@keyframes floatBlob1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(10vw, 8vh); }
}
@keyframes floatBlob2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-8vw, -6vh); }
}

/* ===== 屏幕切换 ===== */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; }

/* ===== 欢迎页 ===== */
#welcomeScreen {
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding-top: 60px;
  padding-bottom: 40px;
}
.app-icon {
  width: 100px;
  height: 100px;
  margin-bottom: 20px;
  position: relative;
  animation: pulse 3s ease-in-out infinite;
}
.app-icon svg.heart-svg {
  width: 64px;
  height: 64px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 0 16px rgba(236,72,153,0.5)) drop-shadow(0 0 40px rgba(236,72,153,0.2));
}
.app-icon .heart-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, transparent 70%);
  border-radius: 50%;
  animation: heartGlow 2s ease-in-out infinite alternate;
}
.app-icon .heart-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 96px;
  height: 96px;
  border: 1.5px solid rgba(236,72,153,0.2);
  border-radius: 50%;
}
.app-icon .heart-ring2 {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 110px;
  height: 110px;
  border: 1px dashed rgba(74,222,128,0.15);
  border-radius: 50%;
  animation: spinSlow 20s linear infinite;
}
.app-icon .heart-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 8px rgba(74,222,128,0.6);
}
.app-icon .heart-dot:nth-child(5) { top: 2px; left: 50%; }
.app-icon .heart-dot:nth-child(6) { bottom: 8px; right: 8px; background: #22d3ee; box-shadow: 0 0 8px rgba(34,211,238,0.6); }
.app-icon .heart-dot:nth-child(7) { top: 40%; left: 2px; background: #818cf8; box-shadow: 0 0 8px rgba(129,140,248,0.6); }
@keyframes heartGlow {
  from { opacity: 0.6; transform: translate(-50%, -50%) scale(0.9); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}
@keyframes spinSlow {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.app-title {
  font-size: 32px;
  font-weight: 300;
  letter-spacing: 6px;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #4ade80, #22d3ee, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.app-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 36px;
  letter-spacing: 2px;
}
.card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 20px;
  border: 1px solid rgba(74,222,128,0.12);
  padding: 28px 24px;
  box-shadow: 0 8px 32px rgba(10,50,80,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
}
.welcome-info {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(255,255,255,0.55);
  margin-bottom: 24px;
  text-align: center;
}
.welcome-tags {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
}
.welcome-tag {
  font-size: 12px;
  color: rgba(74,222,128,0.8);
  background: rgba(74,222,128,0.08);
  border: 1px solid rgba(74,222,128,0.15);
  padding: 4px 12px;
  border-radius: 20px;
}
.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #4ade80, #22d3ee, #818cf8);
  background-size: 200% 200%;
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 3px;
  transition: opacity 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(34,211,238,0.3);
}
.btn-primary:active { opacity: 0.85; }

/* ===== 答题页 ===== */
#questionScreen {
  min-height: 100vh;
  padding-top: 20px;
  padding-bottom: 40px;
}
.progress-wrap {
  width: 100%;
  margin-bottom: 8px;
}
.progress-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}
.progress-num {
  font-size: 13px;
  font-weight: 600;
  color: rgba(74,222,128,0.8);
}
.progress-bar-bg {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 24px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.section-label {
  font-size: 12px;
  color: rgba(34,211,238,0.7);
  letter-spacing: 2px;
  margin-bottom: 16px;
  text-align: center;
}
.question-card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 20px;
  border: 1px solid rgba(74,222,128,0.1);
  padding: 28px 20px;
  box-shadow: 0 8px 32px rgba(10,50,80,0.15);
  animation: fadeInUp 0.35s ease both;
}
.question-text {
  font-size: 16px;
  line-height: 1.8;
  color: rgba(255,255,255,0.85);
  margin-bottom: 24px;
  text-align: center;
}
.question-hint {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-bottom: 16px;
}
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.option-btn:active { transform: scale(0.98); }
.option-btn.selected {
  background: rgba(74,222,128,0.1);
  border-color: rgba(74,222,128,0.4);
  color: #4ade80;
}
.nav-row {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
.btn-back {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-size: 13px;
  cursor: pointer;
  padding: 8px 16px;
}
.btn-back:active { color: rgba(255,255,255,0.6); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== 广告过渡页 ===== */
#adGateScreen {
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 0;
}
.gate-icon {
  font-size: 72px;
  margin-bottom: 20px;
  filter: drop-shadow(0 0 20px rgba(34,211,238,0.4));
  animation: pulse 3s ease-in-out infinite;
}
.gate-title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.gate-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 32px;
  text-align: center;
  line-height: 1.6;
}
.gate-preview {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  border: 1px solid rgba(74,222,128,0.08);
  padding: 20px;
  margin-bottom: 28px;
  filter: blur(6px);
  pointer-events: none;
  user-select: none;
}
.gate-preview-row {
  height: 12px;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  margin-bottom: 10px;
}
.gate-preview-row:last-child { width: 60%; margin-bottom: 0; }
.btn-unlock {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 1px;
  box-shadow: 0 4px 24px rgba(74,222,128,0.25);
  transition: opacity 0.2s;
}
.btn-unlock:active { opacity: 0.85; }
.btn-unlock:disabled {
  opacity: 0.55;
  cursor: wait;
}
.btn-unlock-sub {
  display: block;
  font-size: 11px;
  font-weight: 400;
  opacity: 0.7;
  margin-top: 4px;
}

/* ===== 广告弹窗 ===== */
.ad-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.ad-overlay.hidden { display: none; }
.ad-box {
  width: 300px;
  background: linear-gradient(160deg, #0d2137, #0a1a2e);
  border-radius: 20px;
  border: 1px solid rgba(74,222,128,0.2);
  padding: 32px 24px 24px;
  text-align: center;
  position: relative;
  box-shadow: 0 16px 48px rgba(10,50,80,0.4);
}
.ad-badge {
  position: absolute;
  top: 12px; left: 12px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.ad-icon { font-size: 48px; margin-bottom: 12px; filter: drop-shadow(0 0 12px rgba(74,222,128,0.5)); }
.ad-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.ad-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
  margin-bottom: 24px;
}
.ad-progress-wrap {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 12px;
}
.ad-progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 2px;
  transition: width 1s linear;
}
.ad-timer {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}
.ad-close-btn {
  background: rgba(74,222,128,0.12);
  border: 1px solid rgba(74,222,128,0.2);
  color: #fff;
  padding: 10px 32px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.2s;
}
.ad-close-btn:active { background: rgba(74,222,128,0.25); }

/* ===== 结果页 ===== */
#resultScreen {
  padding-top: 20px;
  padding-bottom: 40px;
}
.result-header {
  text-align: center;
  margin-bottom: 24px;
}
.result-title {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(135deg, #4ade80, #22d3ee, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.result-date {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}

/* 环形分数 */
.score-ring-wrap {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
}
.score-ring {
  position: relative;
  width: 160px;
  height: 160px;
}
.score-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.score-ring-bg {
  fill: none;
  stroke: rgba(255,255,255,0.06);
  stroke-width: 10;
}
.score-ring-fill {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s ease;
}
.score-ring-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.score-ring-num {
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
}
.score-ring-label {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}

/* 维度条 */
.dim-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(74,222,128,0.08);
  border-radius: 14px;
  padding: 18px 16px;
  margin-bottom: 12px;
  animation: fadeInUp 0.4s ease both;
}
.dim-card:nth-child(2) { animation-delay: 0.08s; }
.dim-card:nth-child(3) { animation-delay: 0.16s; }
.dim-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.dim-row:last-child { margin-bottom: 0; }
.dim-label {
  width: 70px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  flex-shrink: 0;
}
.dim-bar-bg {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 10px;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s ease;
}
.dim-val {
  width: 36px;
  font-size: 12px;
  font-weight: 600;
  text-align: right;
  flex-shrink: 0;
}
.dim-card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* 详细分析卡片 */
.deep-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(74,222,128,0.08);
  border-radius: 14px;
  padding: 18px 16px;
  margin-bottom: 12px;
  animation: fadeInUp 0.4s ease both;
}
.deep-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.deep-card-icon {
  font-size: 20px;
  filter: drop-shadow(0 0 6px rgba(74,222,128,0.4));
}
.deep-card-title {
  font-size: 15px;
  font-weight: 600;
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.deep-card-badge {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 500;
}
.deep-card-text {
  font-size: 13px;
  line-height: 1.9;
  color: rgba(220,230,255,0.6);
}

/* 建议卡片 */
.rec-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 12px;
}
.rec-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(74,222,128,0.08);
  border-radius: 12px;
  padding: 14px;
}
.rec-icon { font-size: 24px; flex-shrink: 0; }
.rec-text {
  font-size: 13px;
  line-height: 1.7;
  color: rgba(220,230,255,0.6);
}
.rec-text strong {
  color: rgba(255,255,255,0.8);
  font-weight: 500;
  display: block;
  margin-bottom: 2px;
}

/* 危机提示 */
.crisis-card {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  text-align: center;
}
.crisis-card .crisis-title {
  font-size: 14px;
  font-weight: 600;
  color: #f87171;
  margin-bottom: 8px;
}
.crisis-card .crisis-text {
  font-size: 12px;
  line-height: 1.7;
  color: rgba(248,113,113,0.7);
}
.crisis-card .crisis-phone {
  font-size: 18px;
  font-weight: 700;
  color: #f87171;
  margin-top: 8px;
  letter-spacing: 1px;
}

/* 免责声明 */
.disclaimer {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  text-align: center;
  line-height: 1.6;
  margin: 16px 0;
  padding: 0 8px;
}

/* 底部按钮 */
.bottom-btns {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}
.bottom-btns .btn-primary { flex: 1; font-size: 14px; padding: 12px; letter-spacing: 1px; }
.btn-secondary {
  flex: 1;
  padding: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  cursor: pointer;
  letter-spacing: 1px;
}
.btn-secondary:active { background: rgba(255,255,255,0.1); }

/* toast */
.toast {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 2000;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 分享长图预览 */
.share-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  backdrop-filter: blur(8px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.share-overlay.hidden { display: none; }
.share-tip {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin: 12px 0 8px;
  text-align: center;
}
.share-img-wrap {
  flex: 1;
  width: 100%;
  max-width: 375px;
  padding: 12px 16px;
  overflow-y: auto;
}
.share-img-wrap img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.share-btns {
  display: flex;
  gap: 10px;
  padding: 12px 16px 24px;
  width: 100%;
  max-width: 375px;
}
.share-btns button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  font-size: 14px;
  cursor: pointer;
  border: none;
  letter-spacing: 1px;
}
.btn-save {
  background: linear-gradient(135deg, #4ade80, #22d3ee);
  color: #fff;
}
.btn-close-share {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.15) !important;
}
</style>
</head>
<body>
<div class="container">

<!-- 欢迎页 -->
<div id="welcomeScreen" class="screen active">
  <div class="app-icon">
    <div class="heart-glow"></div>
    <svg class="heart-svg" viewBox="0 0 24 24" fill="none">
      <defs>
        <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f9a8d4"/>

<script>
// ===== 内嵌 ToBid 激励视频桥接组件，部署 QuizReward.html 时不再依赖外部 JS 文件 =====
(function (root) {
  "use strict";

  var DEFAULTS = {
    adUrl: "https://ap.dongqiudi.com/plat/v3",
    pgid: "1.15.2",
    origin: "tobid",
    sdkId: "6362731749334746",
    sceneId: "leagueCollect_14",
    data: {},
    bridgeTimeout: 5000,
    callbackTimeout: 8000,
    onLog: null
  };

  function extend(target) {
    var i;
    var key;
    var source;
    target = target || {};
    for (i = 1; i < arguments.length; i += 1) {
      source = arguments[i] || {};
      for (key in source) {
        if (Object.prototype.hasOwnProperty.call(source, key)) {
          target[key] = source[key];
        }
      }
    }
    return target;
  }

  function isFunction(value) {
    return typeof value === "function";
  }

  function toError(error) {
    if (error instanceof Error) return error;
    return new Error(String(error || "unknown error"));
  }

  function safeJsonParse(value) {
    if (typeof value !== "string") return value;
    try {
      return JSON.parse(value);
    } catch (error) {
      return value;
    }
  }

  function unwrapNativeResponse(response) {
    var body = response && response._responseWrapedByNative ? response._responseWrapedByNative : response;
    return safeJsonParse(body);
  }

  function findRewardAd(body) {
    var data = body;
    var i;
    if (body && Object.prototype.toString.call(body.data) === "[object Array]") {
      data = body.data;
    }
    if (Object.prototype.toString.call(data) !== "[object Array]") return null;
    for (i = 0; i < data.length; i += 1) {
      if (data[i] && data[i].ad_type === "sdk_rewarded_video") {
        return data[i];
      }
    }
    return null;
  }

  function ensureBridgeConnector() {
    if (root.connectWebViewJavascriptBridge) return;

    root.connectWebViewJavascriptBridge = function (callback) {
      var iframe;

      if (root.WebViewJavascriptBridge) {
        if (!root.WebViewJavascriptBridge._messageHandler && root.WebViewJavascriptBridge.init) {
          root.WebViewJavascriptBridge.init(function () {});
        }
        callback(root.WebViewJavascriptBridge);
        return;
      }

      document.addEventListener("WebViewJavascriptBridgeReady", function () {
        if (root.WebViewJavascriptBridge && !root.WebViewJavascriptBridge._messageHandler && root.WebViewJavascriptBridge.init) {
          root.WebViewJavascriptBridge.init(function () {});
        }
        callback(root.WebViewJavascriptBridge);
      }, false);

      if (root.WVJBCallbacks) {
        root.WVJBCallbacks.push(callback);
        return;
      }

      root.WVJBCallbacks = [callback];
      iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = "https://__bridge_loaded__";
      document.documentElement.appendChild(iframe);
      setTimeout(function () {
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      }, 0);
    };
  }

  function RewardVideoBridge(options) {
    this.options = extend({}, DEFAULTS, options || {});
    this.currentPayload = null;
  }

  RewardVideoBridge.prototype.log = function (title, data) {
    if (isFunction(this.options.onLog)) {
      this.options.onLog(title, data);
    }
    if (root.console && root.console.log) {
      root.console.log("[RewardVideoBridge] " + title, data || "");
    }
  };

  RewardVideoBridge.prototype.getBridge = function (callback) {
    var self = this;
    var done = false;
    var timer;

    ensureBridgeConnector();

    timer = setTimeout(function () {
      if (done) return;
      done = true;
      callback(new Error("未检测到 WebViewJavascriptBridge"));
    }, this.options.bridgeTimeout);

    root.connectWebViewJavascriptBridge(function (bridge) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      if (bridge && bridge.callHandler) {
        self.log("bridge ready");
        callback(null, bridge);
      } else {
        callback(new Error("桥对象存在，但没有 callHandler 方法"));
      }
    });
  };

  RewardVideoBridge.prototype.callHandler = function (name, params, callback) {
    var self = this;
    var cb = isFunction(callback) ? callback : function () {};

    this.log("callHandler: " + name, params);
    this.getBridge(function (bridgeError, bridge) {
      var done;
      var timer;

      if (bridgeError) {
        self.log(name + " bridge error", { message: bridgeError.message });
        cb(bridgeError);
        return;
      }

      done = false;
      timer = setTimeout(function () {
        if (done) return;
        done = true;
        self.log(name + " callback timeout");
        cb(null, null, { timeout: true });
      }, self.options.callbackTimeout);

      try {
        bridge.callHandler(name, params || {}, function (response) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          self.log(name + " callback", response);
          cb(null, response, { timeout: false });
        });
      } catch (error) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        self.log(name + " call error", { message: error.message });
        cb(error);
      }
    });
  };

  RewardVideoBridge.prototype.detectBridge = function (callback) {
    this.getBridge(function (error) {
      if (isFunction(callback)) callback(error || null);
    });
  };

  RewardVideoBridge.prototype.buildDefaultPayload = function (options) {
    var opts = extend({}, this.options, options || {});
    if (!opts.sdkId && !opts.sdk_id) {
      throw new Error("缺少 sdkId，无法请求激励视频广告位");
    }
    return {
      origin: opts.origin || "",
      sdk_id: opts.sdk_id || opts.sdkId,
      imp_mon_arr: opts.imp_mon_arr || opts.impMonArr || [],
      click_mon_arr: opts.click_mon_arr || opts.clickMonArr || [],
      ct: opts.ct || "",
      pgid: opts.pgid || this.options.pgid
    };
  };

  RewardVideoBridge.prototype.setPayload = function (payload) {
    this.currentPayload = extend({}, payload || {});
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.getPayload = function () {
    return this.currentPayload;
  };

  RewardVideoBridge.prototype.preloadPayload = function (payload, callback) {
    var finalPayload = this.setPayload(payload);
    this.callHandler("preLoadVideo", finalPayload, callback);
  };

  RewardVideoBridge.prototype.preload = function (options, callback) {
    var payload;
    var cb = callback;
    if (isFunction(options)) {
      cb = options;
      options = {};
    }

    try {
      payload = this.buildDefaultPayload(options);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.preloadPayload(payload, cb);
  };

  RewardVideoBridge.prototype.loadFromConfig = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.callHandler("adRequest", {
      method: "get",
      url: opts.adUrl || this.options.adUrl,
      param: {
        pgid: opts.pgid || this.options.pgid
      }
    }, function (error, response) {
      var body;
      var ad;
      var payload;

      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }

      body = unwrapNativeResponse(response);
      self.log("adRequest unwrapped", body);
      ad = findRewardAd(body);
      if (!ad) {
        if (isFunction(cb)) cb(new Error("adRequest 没找到 ad_type=sdk_rewarded_video 的广告"));
        return;
      }

      payload = {
        origin: ad.ad_source && ad.ad_source.sdk_origin,
        sdk_id: ad.ad_source && ad.ad_source.sdk_position_id,
        imp_mon_arr: ad.imp_mon_arr || [],
        click_mon_arr: ad.click_mon_arr || [],
        ct: "",
        pgid: opts.pgid || self.options.pgid
      };

      if (!payload.sdk_id) {
        if (isFunction(cb)) cb(new Error("广告配置里没有 ad_source.sdk_position_id"));
        return;
      }

      self.preloadPayload(payload, function (preloadError, preloadResponse, meta) {
        if (isFunction(cb)) cb(preloadError || null, payload, preloadResponse, meta);
      });
    });
  };

  RewardVideoBridge.prototype.show = function (options, callback) {
    var opts = options || {};
    var cb = callback;
    var base;
    var payload;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    try {
      base = this.currentPayload || this.buildDefaultPayload(opts);
      payload = extend({
        id: opts.id || opts.sceneId || this.options.sceneId,
        data: opts.data || this.options.data || {}
      }, base);
    } catch (error) {
      if (isFunction(cb)) cb(toError(error));
      return;
    }

    this.callHandler("connectVideo", payload, cb);
  };

  RewardVideoBridge.prototype.preloadThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.preload(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  RewardVideoBridge.prototype.loadFromConfigThenShow = function (options, callback) {
    var self = this;
    var opts = options || {};
    var cb = callback;

    if (isFunction(options)) {
      cb = options;
      opts = {};
    }

    this.loadFromConfig(opts, function (error) {
      if (error) {
        if (isFunction(cb)) cb(error);
        return;
      }
      self.show(opts, cb);
    });
  };

  root.RewardVideoBridge = {
    create: function (options) {
      return new RewardVideoBridge(options);
    },
    Constructor: RewardVideoBridge
  };
})(window);

</script>

  // PSS-4 (16-19)

  {s:'压力感知',q:'在过去一个月里，你多常有信心处理个人问题',opts:['从不','偶尔','有时','经常','总是'],vals:[4,3,2,1,0]},
  {s:'压力感知',q:'在过去一个月里，你多常感觉事情正朝着好的方向发展',opts:['从不','偶尔','有时','经常','总是'],vals:[4,3,2,1,0]},
  {s:'压力感知',q:'在过去一个月里，你多常感到困难堆积如山，无法克服',opts:['从不','偶尔','有时','经常','总是'],vals:[0,1,2,3,4]}
];

var answers = new Array(20).fill(-1);
var currentQ = 0;
var rewardAd = null;
var rewardAdInited = false;
var rewardAdLoading = false;
var rewardAdSessionId = 0;
var rewardAdUnlockTimer = null;
var rewardAdLaunchFallbackTimer = null;
var rewardAdWatchStartedAt = 0;
var rewardAdWatchDelay = 8000;
var rewardAdPendingCallback = null;
var rewardAdLogPrefix = '[mental-health-reward]';

// ===== 屏幕切换 =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startTest() {
  currentQ = 0;
  answers.fill(-1);
  showScreen('questionScreen');
  renderQuestion();
}

// ===== 答题逻辑 =====
function renderQuestion() {
  var q = QUESTIONS[currentQ];
  var area = document.getElementById('questionArea');
  document.getElementById('sectionLabel').textContent = q.s;
  document.getElementById('progressNum').textContent = (currentQ + 1) + '/20';
  document.getElementById('progressBar').style.width = ((currentQ + 1) / 20 * 100) + '%';
  document.getElementById('btnBack').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  var html = '<div class="question-card"><div class="question-text">' + q.q + '</div>';
  html += '<div class="question-hint">请选择最符合你近期状态的选项</div><div class="options">';
  for (var i = 0; i < q.opts.length; i++) {
    var sel = answers[currentQ] === i ? ' selected' : '';
    html += '<button class="option-btn' + sel + '" onclick="selectOption(' + i + ')">' + q.opts[i] + '</button>';
  }
  html += '</div></div>';
  area.innerHTML = html;
}

function selectOption(idx) {
  answers[currentQ] = idx;
  var btns = document.querySelectorAll('.option-btn');
  btns.forEach(function(b, i){ b.classList.toggle('selected', i === idx); });
  setTimeout(function(){
    if (currentQ < 19) {
      currentQ++;
      renderQuestion();
    } else {
      showScreen('adGateScreen');
      preloadRewardAd(true);
    }
  }, 300);
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

// ===== 评分 =====
function calcScores() {
  var phq9 = 0, gad7 = 0, pss4 = 0;
  for (var i = 0; i <= 8; i++) phq9 += QUESTIONS[i].vals[answers[i]];
  for (var i = 9; i <= 15; i++) gad7 += QUESTIONS[i].vals[answers[i]];
  for (var i = 16; i <= 19; i++) pss4 += QUESTIONS[i].vals[answers[i]];

  var composite = Math.round(100 - (phq9/27*40 + gad7/21*35 + pss4/16*25));
  composite = Math.max(0, Math.min(100, composite));

  return { phq9:phq9, gad7:gad7, pss4:pss4, composite:composite };
}

function getLevel(type, score) {
  if (type === 'phq9') {
    if (score <= 4) return {l:'正常',c:'#4ade80',i:0};
    if (score <= 9) return {l:'轻度抑郁',c:'#fbbf24',i:1};
    if (score <= 14) return {l:'中度抑郁',c:'#fb923c',i:2};
    if (score <= 19) return {l:'中重度抑郁',c:'#f87171',i:3};
    return {l:'重度抑郁',c:'#ef4444',i:4};
  }
  if (type === 'gad7') {
    if (score <= 4) return {l:'正常',c:'#4ade80',i:0};
    if (score <= 9) return {l:'轻度焦虑',c:'#fbbf24',i:1};
    if (score <= 14) return {l:'中度焦虑',c:'#fb923c',i:2};
    return {l:'重度焦虑',c:'#f87171',i:3};
  }
  if (type === 'pss4') {
    if (score <= 5) return {l:'压力较低',c:'#4ade80',i:0};
    if (score <= 8) return {l:'压力适中',c:'#fbbf24',i:1};
    if (score <= 12) return {l:'压力偏高',c:'#fb923c',i:2};
    return {l:'压力很高',c:'#f87171',i:3};
  }
}

function getCompositeLevel(s) {

}

function logRewardAd(title, data) {
  if (window.console && console.log) {
    console.log(rewardAdLogPrefix, title, data || '');
  }
}

function initRewardAd() {
  if (rewardAdInited) return !!rewardAd;
  rewardAdInited = true;

  if (!window.RewardVideoBridge) {
    showToast('激励视频组件加载失败');
    logRewardAd('RewardVideoBridge missing');
    return false;
  }

  rewardAd = RewardVideoBridge.create({
    origin: 'tobid',
    sdkId: '6362731749334746',
    sceneId: 'leagueCollect_14',
    pgid: '1.15.2',
    callbackTimeout: 8000,
    data: {
      from: 'mental-health-test',
      reward: 'view_result'
    },
    onLog: logRewardAd
  });

  rewardAd.detectBridge(function(error) {
    if (error) {
      logRewardAd('bridge detect failed', { message: error.message });
      return;
    }
    logRewardAd('bridge detected');
  });

  return true;
}

function preloadRewardAd(silent) {
  if (!rewardAd && !initRewardAd()) return;
  rewardAd.preload(function(error) {
    if (error) {
      logRewardAd('preload failed', { message: error.message });
      if (!silent) showToast('激励视频预加载失败，请稍后再试');
      return;
    }
    logRewardAd('preload called');
  });
}

function setUnlockButtonLoading(loading) {
  var btn = document.getElementById('rewardUnlockBtn');
  var sub = document.getElementById('rewardUnlockSub');
  if (!btn || !sub) return;
  btn.disabled = loading;
  btn.firstChild.nodeValue = loading ? '正在打开激励视频' : '查看激励视频解锁报告';
  sub.textContent = loading ? '进入广告后 8 秒自动解锁' : '播放完毕后即可查看完整报告';
}

function showRewardAdOverlay(title, desc) {
  document.getElementById('adTitle').textContent = title;
  document.getElementById('adDesc').innerHTML = desc;
  document.getElementById('adTimer').textContent = '进入广告后 8 秒自动解锁';
  document.getElementById('adProgressBar').style.width = '100%';
  document.getElementById('adCloseBtn').style.display = 'inline-block';
  document.getElementById('adOverlay').classList.remove('hidden');
}

function clearRewardAdTimers() {
  if (rewardAdUnlockTimer) {
    clearTimeout(rewardAdUnlockTimer);
    rewardAdUnlockTimer = null;
  }
  if (rewardAdLaunchFallbackTimer) {
    clearTimeout(rewardAdLaunchFallbackTimer);
    rewardAdLaunchFallbackTimer = null;
  }
}

function resetRewardAdWaiting(message) {
  rewardAdSessionId++;
  rewardAdLoading = false;
  rewardAdWatchStartedAt = 0;
  rewardAdPendingCallback = null;
  clearRewardAdTimers();
  document.getElementById('adOverlay').classList.add('hidden');
  setUnlockButtonLoading(false);
  if (message) showToast(message);
  setTimeout(function(){ preloadRewardAd(true); }, 500);
}

function hideRewardAdOverlay() {
  resetRewardAdWaiting('已取消等待，可重新点击观看');
}

function completeRewardAdUnlock(sessionId, reason, response) {
  var callback;
  if (sessionId !== rewardAdSessionId || !rewardAdLoading) return;

  callback = rewardAdPendingCallback;
  rewardAdLoading = false;
  rewardAdWatchStartedAt = 0;
  rewardAdPendingCallback = null;
  clearRewardAdTimers();
  document.getElementById('adOverlay').classList.add('hidden');
  setUnlockButtonLoading(false);
  logRewardAd('unlock result', { reason: reason, response: response || null });
  showToast('广告观看完成，正在打开报告');

  if (typeof callback === 'function') callback();
  setTimeout(function(){ preloadRewardAd(true); }, 800);
}

function startRewardAdUnlockTimer(sessionId, reason) {
  if (sessionId !== rewardAdSessionId || !rewardAdLoading || rewardAdUnlockTimer) return;

  rewardAdWatchStartedAt = Date.now();
  document.getElementById('adTitle').textContent = '激励视频播放中';
  document.getElementById('adDesc').innerHTML = '请观看激励视频，8 秒后自动打开报告';
  document.getElementById('adTimer').textContent = '8 秒后自动解锁报告';
  logRewardAd('start 8s unlock timer', { reason: reason });

  rewardAdUnlockTimer = setTimeout(function() {
    completeRewardAdUnlock(sessionId, reason || '8s auto unlock');
  }, rewardAdWatchDelay);
}

function handleRewardAdPageLeave() {
  if (!rewardAdLoading) return;
  startRewardAdUnlockTimer(rewardAdSessionId, 'page leave');
}

function handleRewardAdPageReturn() {
  if (!rewardAdLoading || !rewardAdWatchStartedAt) return;
  if (Date.now() - rewardAdWatchStartedAt < rewardAdWatchDelay) {
    logRewardAd('return before 8s, reset reward state');
    resetRewardAdWaiting('广告未观看满 8 秒，请重新观看');
  }
}

function showRewardAd(callback) {
  var sessionId;
  if (rewardAdLoading) return;
  if (!rewardAd && !initRewardAd()) return;

  clearRewardAdTimers();
  rewardAdSessionId++;
  sessionId = rewardAdSessionId;
  rewardAdPendingCallback = callback;
  rewardAdWatchStartedAt = 0;
  rewardAdLoading = true;
  setUnlockButtonLoading(true);
  showRewardAdOverlay('正在拉起激励视频', '请稍候，进入广告后观看 8 秒即可查看报告');

  preloadRewardAd(true);

  setTimeout(function() {
    if (sessionId !== rewardAdSessionId || !rewardAdLoading) return;

    rewardAd.show({
      data: {
        from: 'mental-health-test',
        reward: 'view_result'
      }
    }, function(error, response, meta) {
      if (sessionId !== rewardAdSessionId || !rewardAdLoading) return;

      if (error) {
        logRewardAd('show failed', { message: error.message });
        resetRewardAdWaiting();
        showToast('激励视频展示失败，请稍后再试');
        return;
      }

      if (meta && meta.timeout) {
        logRewardAd('show callback timeout, unlock by 8s fallback');
        completeRewardAdUnlock(sessionId, 'connectVideo 8s timeout', response);
        return;
      }

      logRewardAd('connectVideo callback received', response);
      startRewardAdUnlockTimer(sessionId, 'connectVideo callback');
    });

    rewardAdLaunchFallbackTimer = setTimeout(function() {
      startRewardAdUnlockTimer(sessionId, 'launch fallback');
    }, 1200);
  }, 900);
}

document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    handleRewardAdPageLeave();
  } else {
    handleRewardAdPageReturn();
  }
});
window.addEventListener('pagehide', handleRewardAdPageLeave);
window.addEventListener('pageshow', handleRewardAdPageReturn);
window.addEventListener('blur', handleRewardAdPageLeave);
window.addEventListener('focus', handleRewardAdPageReturn);

  var selfAware = Math.round(Math.min(100, 50 + (sc.composite - 50) * 0.6 + (answers[5] < 2 ? 10 : 0)));
  var lifeSat = Math.round(sc.composite * 0.7 + emoStab * 0.15 + stressRes * 0.15);
  selfAware = Math.max(10, Math.min(100, selfAware));
  lifeSat = Math.max(10, Math.min(100, lifeSat));

  var dims = [
    {name:'情绪稳定性', val:emoStab},
    {name:'抗压能力', val:stressRes},
    {name:'焦虑管理', val:anxMgmt},
    {name:'自我认知', val:selfAware},
    {name:'生活满意度', val:lifeSat}

  if (gadL.i >= 1) topIssues.push('gad7');

  var recs = [];

    if (recs.length >= 5) return;
    for (var j = 0; j < r.for.length; j++) {
      if (topIssues.indexOf(r.for[j]) >= 0) { recs.push(r); break; }
    }
  });
  if (recs.length < 3) recs = RECOMMENDATIONS.slice(0, 4);

  var dimData = [
    {name:'抑郁指数', score:sc.phq9, max:27, level:phqL},
    {name:'焦虑指数', score:sc.gad7, max:21, level:gadL},
    {name:'压力指数', score:sc.pss4, max:16, level:pssL}
  ];
  dimData.forEach(function(d){

  });

  // 详细分析
  var analyses = [

  var gadL = getLevel('gad7', sc.gad7);
  var pssL = getLevel('pss4', sc.pss4);
  var compL = getCompositeLevel(sc.composite);

  var W = 750, pad = 50;
  var contentW = W - pad * 2;

  // 预计算高度
  var H = 1400;
  var canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  var ctx = canvas.getContext('2d');

  // 背景渐变
  var bg = ctx.createLinearGradient(0, 0, W * 0.3, H);
  bg.addColorStop(0, '#0a1628');
  bg.addColorStop(0.3, '#0d2137');
  bg.addColorStop(0.6, '#0a1a2e');
  bg.addColorStop(1, '#0a1628');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 装饰光斑
  var grd1 = ctx.createRadialGradient(100, 200, 0, 100, 200, 250);
  grd1.addColorStop(0, 'rgba(74,222,128,0.06)');
  grd1.addColorStop(1, 'transparent');
  ctx.fillStyle = grd1;
  ctx.fillRect(0, 0, W, H);
  var grd2 = ctx.createRadialGradient(600, 900, 0, 600, 900, 300);
  grd2.addColorStop(0, 'rgba(129,140,248,0.06)');
  grd2.addColorStop(1, 'transparent');
  ctx.fillStyle = grd2;
  ctx.fillRect(0, 0, W, H);

  var y = 60;

  // 标题
  ctx.textAlign = 'center';
  ctx.font = '600 36px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = '#4ade80';
  ctx.fillText('心理健康评估报告', W / 2, y);
  y += 30;

  // 日期
  var today = new Date();
  var dateStr = today.getFullYear() + '/' + (today.getMonth()+1) + '/' + today.getDate();
  ctx.font = '13px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('测试日期: ' + dateStr, W / 2, y);
  y += 50;

  // 综合分数 - 圆环
  var cx = W / 2, cy = y + 80, r = 70;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 12;
  ctx.stroke();

  var startAngle = -Math.PI / 2;
  var endAngle = startAngle + (sc.composite / 100) * Math.PI * 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.strokeStyle = compL.c;
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.textAlign = 'center';
  ctx.font = '700 52px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = compL.c;
  ctx.fillText(sc.composite, cx, cy + 16);
  ctx.font = '13px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText(compL.l, cx, cy + 40);
  y = cy + r + 50;

  // 分隔线
  function drawDivider(yy) {
    ctx.beginPath();
    ctx.moveTo(pad, yy);
    ctx.lineTo(W - pad, yy);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 三维度得分
  drawDivider(y);
  y += 30;
  ctx.textAlign = 'left';
  ctx.font = '600 22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('📊 三维度评估', pad, y);
  y += 30;

  var dims3 = [
    {name:'抑郁指数', score:sc.phq9, max:27, level:phqL},
    {name:'焦虑指数', score:sc.gad7, max:21, level:gadL},
    {name:'压力指数', score:sc.pss4, max:16, level:pssL}
  ];
  dims3.forEach(function(d) {
    ctx.font = '15px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText(d.name, pad, y);

    // 等级标签
    ctx.textAlign = 'right';
    ctx.fillStyle = d.level.c;
    ctx.fillText(d.level.l + '  ' + d.score + '/' + d.max, W - pad, y);

    y += 12;
    // 条形背景
    var barX = pad, barW = contentW, barH = 10;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(ctx, barX, y, barW, barH, 5);
    ctx.fill();
    // 条形填充
    var fillW = Math.max(8, d.score / d.max * barW);
    ctx.fillStyle = d.level.c;
    roundRect(ctx, barX, y, fillW, barH, 5);
    ctx.fill();
    y += 36;
  });

  // 五维画像
  y += 10;
  drawDivider(y);
  y += 30;
  ctx.textAlign = 'left';
  ctx.font = '600 22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('🎯 心理画像', pad, y);
  y += 30;

  var emoStab = Math.round(100 - sc.phq9/27*100);
  var stressRes = Math.round(100 - sc.pss4/16*100);
  var anxMgmt = Math.round(100 - sc.gad7/21*100);
  var selfAware = Math.round(Math.min(100, 50 + (sc.composite - 50) * 0.6 + (answers[5] < 2 ? 10 : 0)));
  var lifeSat = Math.round(sc.composite * 0.7 + emoStab * 0.15 + stressRes * 0.15);
  selfAware = Math.max(10, Math.min(100, selfAware));
  lifeSat = Math.max(10, Math.min(100, lifeSat));

  var dims5 = [
    {name:'情绪稳定性', val:emoStab},
    {name:'抗压能力', val:stressRes},
    {name:'焦虑管理', val:anxMgmt},
    {name:'自我认知', val:selfAware},
    {name:'生活满意度', val:lifeSat}
  ];
  dims5.forEach(function(d) {
    var c = d.val >= 70 ? '#4ade80' : d.val >= 40 ? '#fbbf24' : '#fb923c';
    ctx.font = '15px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.textAlign = 'left';
    ctx.fillText(d.name, pad, y);
    ctx.textAlign = 'right';
    ctx.fillStyle = c;
    ctx.fillText(d.val, W - pad, y);
    y += 12;
    var barX = pad, barW = contentW, barH = 10;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(ctx, barX, y, barW, barH, 5);
    ctx.fill();
    ctx.fillStyle = c;
    roundRect(ctx, barX, y, Math.max(8, d.val / 100 * barW), barH, 5);
    ctx.fill();
    y += 32;
  });

  // 各量表等级总结
  y += 10;
  drawDivider(y);
  y += 30;
  ctx.textAlign = 'left';
  ctx.font = '600 22px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('📋 评估总结', pad, y);
  y += 32;

  var summaries = [
    {icon:'💙', label:'情绪健康', level:phqL},
    {icon:'💛', label:'焦虑状态', level:gadL},
    {icon:'💜', label:'压力水平', level:pssL}
  ];
  summaries.forEach(function(s) {
    ctx.font = '16px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(s.icon + ' ' + s.label, pad, y);
    ctx.textAlign = 'right';
    ctx.font = '600 16px -apple-system, PingFang SC, sans-serif';
    ctx.fillStyle = s.level.c;
    ctx.fillText(s.level.l, W - pad, y);
    y += 36;
  });

  // 底部
  y += 20;
  drawDivider(y);
  y += 40;
  ctx.textAlign = 'center';
  ctx.font = '18px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(74,222,128,0.7)';
  ctx.fillText('来测测你的心理健康状态吧', W / 2, y);
  y += 30;
  ctx.font = '12px -apple-system, PingFang SC, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillText('本测试仅供参考，不构成医学诊断', W / 2, y);
  y += 40;

  // 裁剪到实际高度
  var finalCanvas = document.createElement('canvas');
  finalCanvas.width = W;
  finalCanvas.height = y;
  var fctx = finalCanvas.getContext('2d');
  fctx.drawImage(canvas, 0, 0);

  // 显示预览
  var dataUrl = finalCanvas.toDataURL('image/png');
  document.getElementById('shareImg').src = dataUrl;
  document.getElementById('shareOverlay').classList.remove('hidden');
  window._shareDataUrl = dataUrl;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function saveShareImage() {
  var dataUrl = window._shareDataUrl;
  if (!dataUrl) return;
  // 尝试 share API
  if (navigator.share && navigator.canShare) {
    fetch(dataUrl).then(function(r){ return r.blob(); }).then(function(blob){
      var file = new File([blob], 'mental-health-report.png', {type:'image/png'});
      if (navigator.canShare({files:[file]})) {
        navigator.share({files:[file], title:'心理健康评估报告'}).catch(function(){});
        return;
      }
      downloadImage(dataUrl);
    });
  } else {
    downloadImage(dataUrl);
  }
}

function downloadImage(dataUrl) {
  var a = document.createElement('a');
  a.href = dataUrl;
  a.download = 'mental-health-report.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('图片已保存');
}

function closeShareOverlay() {
  document.getElementById('shareOverlay').classList.add('hidden');
}


preloadRewardAd(true);

</script>
